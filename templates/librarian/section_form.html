{% extends "base.html" %}

{% block title %}{{ 'Edit Section' if section else 'Create Section' }} — Library{% endblock %}

{% block content %}
<h2>{{ 'Edit Section' if section else 'Create Section' }}</h2>

<form method="POST" class="mt-3" style="max-width: 500px;">
    <div class="mb-3">
        <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="name" name="name" maxlength="100" required
               value="{{ section.name if section else '' }}">
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ section.description if section and section.description else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">{{ 'Update' if section else 'Create' }}</button>
    <a href="{{ url_for('librarian.sections') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
